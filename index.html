<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennis on UK TV</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: rgba(255,255,255,0.08);
    --border-mid: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --muted: #888;
    --dim: #555;
    --live: #e5534b;
    --live-bg: rgba(229,83,75,0.12);
    --active: #e8a020;
    --active-bg: rgba(232,160,32,0.12);
    --radius: 12px;
    --radius-sm: 8px;
    --radius-pill: 20px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  .header {
    padding: 20px 16px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .header-left h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  .header-left .subtitle { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .live-indicator {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--live); font-weight: 500;
    padding: 5px 10px; background: var(--live-bg);
    border-radius: var(--radius-pill); flex-shrink: 0; margin-top: 3px;
  }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--live); animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .updated-row {
    padding: 6px 16px 0; font-size: 11px; color: var(--dim);
    display: flex; align-items: center; justify-content: space-between;
  }
  .refresh-btn {
    font-size: 11px; color: var(--muted); background: none;
    border: 1px solid var(--border); padding: 4px 11px;
    border-radius: var(--radius-pill); cursor: pointer;
  }
  .refresh-btn:active { opacity: 0.7; }

  .filters { padding: 14px 16px 0; display: flex; gap: 7px; flex-wrap: wrap; }
  .pill {
    font-size: 12px; font-weight: 500; padding: 6px 13px;
    border-radius: var(--radius-pill); border: 1px solid var(--border-mid);
    background: transparent; color: var(--muted); cursor: pointer;
    transition: all 0.15s; -webkit-tap-highlight-color: transparent;
  }
  .pill.active { background: #fff; color: #000; border-color: transparent; }
  .pill:active { transform: scale(0.96); }

  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.07em;
    text-transform: uppercase; color: var(--dim); padding: 20px 16px 8px;
  }

  .match-list { padding: 0 12px 24px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 13px 14px;
    margin-bottom: 8px; position: relative; overflow: hidden;
  }
  .card.live-card { border-color: rgba(229,83,75,0.3); }
  .card.live-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--live);
  }
  .card.active-card { border-color: rgba(232,160,32,0.3); }
  .card.active-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--active);
  }

  .top-row { display: flex; align-items: center; gap: 7px; margin-bottom: 9px; flex-wrap: wrap; }
  .badge { font-size: 10px; font-weight: 600; letter-spacing: 0.05em; padding: 2px 8px; border-radius: var(--radius-pill); }
  .badge-live   { background: var(--live-bg);   color: var(--live);   border: 1px solid rgba(229,83,75,0.3); }
  .badge-active { background: var(--active-bg); color: var(--active); border: 1px solid rgba(232,160,32,0.3); }
  .badge-sched  { background: rgba(255,255,255,0.06); color: var(--muted); }
  .badge-done   { background: rgba(255,255,255,0.04); color: var(--dim); }
  .time-str { font-size: 12px; color: var(--muted); }
  .cat-tag {
    margin-left: auto; font-size: 10px; font-weight: 600;
    padding: 2px 8px; border-radius: var(--radius-pill); letter-spacing: 0.03em;
  }
  .cat-atp { background: rgba(55,138,221,0.15); color: #7bb8f5; }
  .cat-wta { background: rgba(212,83,126,0.15); color: #e88ab0; }
  .cat-grand { background: rgba(63,185,80,0.15); color: #7ed47e; }
  .cat-other { background: rgba(255,255,255,0.07); color: var(--muted); }

  .players { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.35; margin-bottom: 8px; }
  .vs { color: var(--dim); font-weight: 400; font-size: 12px; }

  .score-live {
    display: inline-block; font-size: 11px; font-weight: 600;
    background: rgba(255,255,255,0.07); color: var(--text);
    padding: 2px 8px; border-radius: 6px; margin-bottom: 8px;
  }

  .meta { display: flex; flex-direction: column; gap: 3px; margin-bottom: 10px; }
  .meta-item { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
  .meta-icon { width: 13px; opacity: 0.5; }

  .action-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .tv-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600; padding: 7px 12px;
    border-radius: var(--radius-sm); cursor: pointer;
    text-decoration: none; border: none;
    transition: opacity 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .tv-btn:active { transform: scale(0.95); opacity: 0.85; }
  .tv-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
  .btn-bbc    { background: #e4251b; color: #fff; }
  .btn-sky    { background: #0060ff; color: #fff; }
  .btn-wta    { background: #6d28d9; color: #fff; }
  .btn-atp    { background: #0c6cf2; color: #fff; }
  .btn-tennis { background: #cc1717; color: #fff; }
  .btn-livescore {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600; padding: 6px 11px;
    border-radius: var(--radius-sm); cursor: pointer;
    text-decoration: none; background: rgba(255,255,255,0.07);
    color: var(--muted); border: 1px solid var(--border-mid);
    transition: opacity 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-livescore:active { transform: scale(0.95); opacity: 0.8; }
  .btn-livescore svg { width: 12px; height: 12px; }
  .no-tv { font-size: 11px; color: var(--dim); font-style: italic; }

  .empty { text-align: center; padding: 3rem 1rem; color: var(--dim); font-size: 14px; }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }
  .error-banner {
    margin: 12px 12px 0; padding: 10px 14px; background: rgba(229,83,75,0.1);
    border: 1px solid rgba(229,83,75,0.25); border-radius: var(--radius-sm);
    font-size: 12px; color: #e88a88;
  }

  .footer {
    padding: 8px 16px 32px; text-align: center;
    font-size: 11px; color: var(--dim); line-height: 1.6;
  }
  .footer a { color: var(--muted); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Tennis on UK TV</h1>
    <div class="subtitle" id="date-range">Loading…</div>
  </div>
  <div class="live-indicator" id="live-indicator" style="display:none">
    <span class="live-dot"></span> Live
  </div>
</div>

<div class="updated-row">
  <span id="updated-at"></span>
  <button class="refresh-btn" onclick="loadAndRender()">&#x21BB; Refresh</button>
</div>

<div class="filters" id="filters">
  <button class="pill active" data-filter="all">All</button>
  <button class="pill" data-filter="live">🔴 Live</button>
  <button class="pill" data-filter="wta">WTA</button>
  <button class="pill" data-filter="atp">ATP</button>
  <button class="pill" data-filter="doubles">Doubles</button>
  <button class="pill" data-filter="uk">🇬🇧 UK</button>
</div>

<div id="error-area"></div>
<div id="app"></div>

<div class="footer">
  Broadcast info accurate for UK &middot; <a href="https://www.wtatennis.com/unlocked" target="_blank">WTA Unlocked</a> (free) &middot;
  <a href="https://www.atptour.com/en/atp-challenger-tour/challenger-tv" target="_blank">Challenger TV</a> (free)
</div>

<script>
const CH = {
  BBC:        { label:'BBC iPlayer',      css:'btn-bbc',    url:'https://www.bbc.co.uk/iplayer/search?q=tennis', ios:'bbc-iptvplayer://' },
  SKY:        { label:'Sky Sports Tennis', css:'btn-sky',    url:'https://www.skysports.com/watch/tennis-on-sky', ios:'skygo://' },
  WTA:        { label:'WTA Unlocked ❖',  css:'btn-wta',    url:'https://www.wtatennis.com/unlocked', ios:'https://www.wtatennis.com/unlocked' },
  CHALLENGER: { label:'Challenger TV ❖', css:'btn-atp',    url:'https://www.atptour.com/en/atp-challenger-tour/challenger-tv', ios:'https://www.atptour.com/en/atp-challenger-tour/challenger-tv' },
  TENNIS_TV:  { label:'Tennis TV',        css:'btn-tennis', url:'https://www.tennistv.com', ios:'tennistv://' },
};

function getChannels(t) {
  const tl = t.toLowerCase();
  if (tl.includes('queen') || tl.includes('hsbc'))            return [CH.BBC, CH.SKY];
  if (tl.includes('ilkley') && (tl.includes('challenger') || (tl.includes('men') && !tl.includes('women')))) return [CH.CHALLENGER];
  if (tl.includes('ilkley'))                                  return [CH.WTA];
  if (tl.includes('hertogenbosch') || tl.includes('libema'))  return tl.includes('men') && !tl.includes('women') ? [CH.TENNIS_TV, CH.SKY] : [CH.TENNIS_TV];
  if (tl.includes('london'))                                  return [CH.BBC, CH.SKY];
  if (tl.includes('wimbledon'))                               return [CH.BBC];
  if (tl.includes('125') || tl.includes('wta'))               return [CH.WTA];
  if (tl.includes('challenger'))                              return [CH.CHALLENGER];
  if (tl.includes('atp'))                                     return [CH.TENNIS_TV, CH.SKY];
  return [];
}

function livescoreURL() {
  return 'https://www.livescore.com/en/tennis/';
}

function getCat(t) {
  const tl = t.toLowerCase();
  const d  = tl.includes('doubles') ? ' · Doubles' : '';
  if (tl.includes('wimbledon'))                                          return { label:'Grand Slam'+d, css:'cat-grand' };
  if (tl.includes('wta 500') || tl.includes('hsbc') || tl.includes('queen')) return { label:'WTA 500 / ATP 500'+d, css:'cat-wta' };
  if (tl.includes('wta 125') || tl.includes('125k'))                     return { label:'WTA 125'+d, css:'cat-wta' };
  if (tl.includes('wta'))                                                return { label:'WTA'+d, css:'cat-wta' };
  if (tl.includes('atp 500'))                                            return { label:'ATP 500'+d, css:'cat-atp' };
  if (tl.includes('challenger'))                                         return { label:'ATP Challenger'+d, css:'cat-atp' };
  if (tl.includes('atp'))                                                return { label:'ATP'+d, css:'cat-atp' };
  return { label: d ? 'Doubles' : 'Tennis', css:'cat-other' };
}

function getVenue(t) {
  const tl = t.toLowerCase();
  if (tl.includes('ilkley'))          return 'Ilkley LT&SC, Yorkshire 🇬🇧';
  if (tl.includes('queen') || tl.includes('hsbc') || tl.includes('london')) return "Queen's Club, London 🇬🇧";
  if (tl.includes('hertogenbosch'))   return 'Rosmalen, Netherlands 🇳🇱';
  if (tl.includes('modena'))          return 'Modena, Italy 🇮🇹';
  if (tl.includes('wimbledon'))       return 'All England Club, London 🇬🇧';
  if (tl.includes('nottingham'))      return 'Nottingham, UK 🇬🇧';
  if (tl.includes('eastbourne'))      return 'Eastbourne, UK 🇬🇧';
  if (tl.includes('birmingham'))      return 'Edgbaston Priory, Birmingham 🇬🇧';
  return '';
}

function getTournamentDisplay(t) {
  return t.replace(/ (Men|Women)(\s+(Singles|Doubles))?$/i, '')
          .replace(/,\s*(Great Britain|Italy|Netherlands|Argentina|USA?)\s*/i, '')
          .trim();
}

const UK_WORDS = ['ilkley','queen','hsbc','london','wimbledon','nottingham','eastbourne','birmingham','great britain'];

function getFilterTags(m) {
  const tl = m.tournament.toLowerCase();
  const tags = ['all'];
  const st = effectiveStatus(m);
  if (st === 'in_progress' || st === 'active')                          tags.push('live');
  if (tl.includes('women') || tl.includes('wta'))                       tags.push('wta');
  if (tl.includes('men') || tl.includes('atp') || tl.includes('challenger')) tags.push('atp');
  if (tl.includes('doubles'))                                            tags.push('doubles');
  if (UK_WORDS.some(k => tl.includes(k)))                               tags.push('uk');
  return tags;
}

function effectiveStatus(m) {
  if (m.status === 'active') return 'active';
  if (m.status !== 'in_progress') return m.status;
  if (!m.start_iso) return m.status;
  if (new Date(m.start_iso) - new Date() > 2 * 60 * 1000) return 'scheduled';
  return 'in_progress';
}

function priority(m) {
  const tl      = m.tournament.toLowerCase();
  const isUK    = UK_WORDS.some(k => tl.includes(k));
  const st      = effectiveStatus(m);
  const isLive  = st === 'in_progress';
  const isActive = st === 'active';
  if (isLive && isUK)    return 0;
  if (isLive)             return 1;
  if (isActive && isUK)  return 2;
  if (isActive)           return 3;
  if (isUK)               return 4;
  return 5;
}

function fmtScore(sets) {
  if (!sets || !sets.length) return '';
  return sets.map(s => `${s.p1}–${s.p2}`).join('  ');
}

const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

const SVG_TV = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="14" height="10" rx="1.5"/><path d="M5 13.5l1.5-1.5h3L11 13.5"/></svg>`;
const SVG_LIVE = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="3"/><path d="M3.5 3.5a6.5 6.5 0 0 0 0 9M12.5 3.5a6.5 6.5 0 0 1 0 9"/></svg>`;

function buildCard(m) {
  const st       = effectiveStatus(m);
  const isLive   = st === 'in_progress';
  const isActive = st === 'active';
  const isDone   = st === 'completed';
  const channels = getChannels(m.tournament);
  const cat      = getCat(m.tournament);
  const venue    = getVenue(m.tournament);
  const score    = fmtScore(m.sets);
  const tourDisp = getTournamentDisplay(m.tournament);
  const awayPart = m.away && m.away !== 'TBC' ? ` <span class="vs">vs</span> ${m.away}` : '';

  const badgeCls = isLive ? 'badge-live' : isActive ? 'badge-active' : isDone ? 'badge-done' : 'badge-sched';
  const badgeTxt = isLive ? '● LIVE' : isActive ? '⏸ SUSPENDED' : isDone ? 'RESULT' : 'SCHEDULED';

  const tvHTML = channels.length
    ? channels.map(ch => {
        const href = isIOS ? ch.ios : ch.url;
        return `<a class="tv-btn ${ch.css}" href="${href}" target="_blank" rel="noopener">${SVG_TV}${ch.label}</a>`;
      }).join('')
    : `<span class="no-tv">UK broadcast TBC</span>`;

  const livescoreBtn = isLive
    ? `<a class="btn-livescore" href="${livescoreURL()}" target="_blank" rel="noopener">${SVG_LIVE} Livescore</a>`
    : '';

  return `
  <div class="card${isLive ? ' live-card' : isActive ? ' active-card' : ''}">
    <div class="top-row">
      <span class="badge ${badgeCls}">${badgeTxt}</span>
      <span class="time-str">${m.local_start.replace(/^(Mon|Tue|Wed|Thu|Fri|Sat|Sun),?\s*/i,'')}</span>
      <span class="cat-tag ${cat.css}">${cat.label}</span>
    </div>
    <div class="players">${m.home}${awayPart}</div>
    ${score ? `<div class="score-live">${score}</div>` : ''}
    <div class="meta">
      ${venue ? `<span class="meta-item"><svg class="meta-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8 1.5a4.5 4.5 0 0 1 4.5 4.5c0 3-4.5 8.5-4.5 8.5S3.5 9 3.5 6A4.5 4.5 0 0 1 8 1.5z"/><circle cx="8" cy="6" r="1.5"/></svg>${venue}</span>` : ''}
      <span class="meta-item"><svg class="meta-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><path d="M5.5 8a5.9 5.9 0 0 0 2.5 4.5A5.9 5.9 0 0 0 10.5 8 5.9 5.9 0 0 0 8 3.5 5.9 5.9 0 0 0 5.5 8z"/><path d="M2 8h12"/></svg>${tourDisp}</span>
    </div>
    <div class="action-row">${tvHTML}${livescoreBtn}</div>
  </div>`;
}

let activeFilter = 'all';
let allMatches   = [];

function render() {
  const app     = document.getElementById('app');
  const liveInd = document.getElementById('live-indicator');

  let matches = allMatches.slice().filter(m => activeFilter === 'all' || getFilterTags(m).includes(activeFilter));

  const anyLive = allMatches.some(m => effectiveStatus(m) === 'in_progress');
  liveInd.style.display = anyLive ? 'flex' : 'none';

  if (!matches.length) {
    app.innerHTML = `<div class="empty"><div class="empty-icon">🎾</div>No matches for this filter.</div>`;
    return;
  }

  matches.sort((a, b) => {
    const ta = a.start_iso || '';
    const tb = b.start_iso || '';
    if (ta !== tb) return ta.localeCompare(tb);
    return priority(a) - priority(b);
  });

  const live   = matches.filter(m => effectiveStatus(m) === 'in_progress');
  const active = matches.filter(m => effectiveStatus(m) === 'active');
  const rest   = matches.filter(m => { const s = effectiveStatus(m); return s !== 'in_progress' && s !== 'active'; });

  // Group rest by calendar date (YYYY-MM-DD from start_iso)
  const dayOrder = [];
  const byDay = {};
  rest.forEach(m => {
    const day = (m.start_iso || '').slice(0, 10);
    if (!byDay[day]) { byDay[day] = []; dayOrder.push(day); }
    byDay[day].push(m);
  });

  const todayStr    = new Date().toISOString().slice(0, 10);
  const tomorrowStr = new Date(Date.now() + 86400000).toISOString().slice(0, 10);

  let html = '<div class="match-list">';
  if (live.length)   { html += `<div class="section-label">Live now</div>`;  live.forEach(m => { html += buildCard(m); }); }
  if (active.length) { html += `<div class="section-label">Suspended</div>`; active.forEach(m => { html += buildCard(m); }); }

  dayOrder.forEach(day => {
    const dayName = (byDay[day][0].local_start || '').split('·')[0].trim();
    let label = dayName;
    if (day === todayStr)    label = `Today · ${dayName}`;
    else if (day === tomorrowStr) label = `Tomorrow · ${dayName}`;
    html += `<div class="section-label">${label}</div>`;
    byDay[day].forEach(m => { html += buildCard(m); });
  });

  html += '</div>';
  app.innerHTML = html;
}

function fmtDateRange() {
  const d   = new Date();
  const end = new Date(d); end.setDate(end.getDate() + 7);
  const o   = { day:'numeric', month:'short' };
  return `${d.toLocaleDateString('en-GB',o)} – ${end.toLocaleDateString('en-GB',o)} · UK times`;
}

async function loadAndRender() {
  document.getElementById('error-area').innerHTML = '';
  document.getElementById('updated-at').textContent = 'Loading…';

  try {
    const res  = await fetch(`matches.json?_=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    allMatches = data.matches || [];

    const dataUpdated = data.updated
      ? new Date(data.updated).toLocaleString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) + ' BST'
      : 'unknown';
    document.getElementById('updated-at').textContent = `Data updated ${dataUpdated}`;
    document.getElementById('date-range').textContent  = fmtDateRange();

    render();
  } catch (err) {
    document.getElementById('updated-at').textContent = 'Failed to load';
    document.getElementById('error-area').innerHTML =
      `<div class="error-banner">⚠️ Could not load matches.json — ${err.message}</div>`;
    if (!allMatches.length) {
      document.getElementById('app').innerHTML =
        `<div class="empty"><div class="empty-icon">📡</div>No data loaded. Run the refresh script to populate matches.json.</div>`;
    }
  }
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.pill');
  if (!btn) return;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  render();
});

loadAndRender();
</script>
</body>
</html>
